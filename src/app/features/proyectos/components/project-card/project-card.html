<article class="project-card">

  <div class="project-card__image-wrapper">
    <img
      class="project-card__image"
      [src]="image"
      [alt]="title"
      loading="lazy"
    />
  </div>

  <div class="project-card__content">
    <h3 class="project-card__title">{{ title }}</h3>

    <p class="project-card__description">{{ description }}</p>

    @if (showDetailButton) {
      <button
        class="project-card__see-more"
        type="button"
        (click)="openProjectDetail()"
      >
        Ver más...
      </button>
    }

    <div class="project-card__actions">
      @if (repoPrivate) {
        <button
          class="project-card__action project-card__action--private"
          type="button"
          disabled
          title="Este repositorio es privado"
          aria-label="Repositorio privado"
        >
          <mat-icon>lock</mat-icon>
          <span>Repositorio</span>
        </button>
      } @else if (repoUrl) {
        <a
          class="project-card__action"
          [href]="repoUrl"
          target="_blank"
          rel="noopener"
          aria-label="Ver repositorio en GitHub"
        >
          <mat-icon>code</mat-icon>
          <span>Repositorio</span>
        </a>
      }
      @if (liveUrl) {
        <a
          class="project-card__action project-card__action--primary"
          [href]="liveUrl"
          target="_blank"
          rel="noopener"
          aria-label="Ver proyecto en vivo"
        >
          <mat-icon>open_in_new</mat-icon>
          <span>Ver proyecto</span>
        </a>
      }
    </div>

    @if (technologies.length) {
      <div class="project-card__tags">
        @for (tech of technologies; track tech) {
          <span class="project-card__tag">{{ tech }}</span>
        }
      </div>
    }
  </div>

</article>
