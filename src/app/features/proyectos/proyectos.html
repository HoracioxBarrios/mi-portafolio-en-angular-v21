<section class="proyectos">
  <div class="proyectos__container">

    <div class="proyectos__header">
      <span class="proyectos__label">{{ tr.t('proyectos.label') }}</span>
      <h2 class="proyectos__title">{{ tr.t('proyectos.title') }}</h2>
      <p class="proyectos__subtitle">{{ tr.t('proyectos.subtitle') }}</p>
    </div>

    <div class="proyectos__grid">
      @for (project of projects; track $index) {
        <app-project-card
          [title]="project.title"
          [description]="tr.t(project.descKey)"
          [image]="project.image"
          [images]="project.images"
          [technologies]="project.technologies"
          [repoUrl]="project.repoUrl"
          [repoPrivate]="project.repoPrivate"
          [liveUrl]="project.liveUrl"
        />
      }
    </div>

  </div>
</section>
