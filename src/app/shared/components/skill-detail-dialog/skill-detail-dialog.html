<div class="skill-dialog">
  <header class="skill-dialog__header">
    <button type="button" class="skill-dialog__close" (click)="close()" aria-label="Cerrar">
      <mat-icon>close</mat-icon>
    </button>
  </header>

  <div class="skill-dialog__body">
    <div class="skill-dialog__icon-wrap">
      <img [src]="skill.icon" [alt]="skill.name" class="skill-dialog__icon" />
    </div>
    <h2 class="skill-dialog__name">{{ skill.name }}</h2>
    <span class="skill-dialog__stack">{{ stackLabel }}</span>
    <p class="skill-dialog__description">{{ skill.description }}</p>
  </div>
</div>
