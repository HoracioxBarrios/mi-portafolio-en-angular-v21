<header class="header">
  <div class="header__container">
    <nav class="header__nav">
      <mat-tab-group
        [selectedIndex]="activeIndex"
        (selectedIndexChange)="onTabChange($event)"
      >
        @for (link of navLinks; track link.id) {
          <mat-tab>
            <ng-template mat-tab-label>
              {{ tr.t(link.key) }}
            </ng-template>
          </mat-tab>
        }
      </mat-tab-group>
    </nav>

    <div class="header__controls">
      <button
        type="button"
        class="header__lang-btn"
        (click)="tr.toggle()"
        [attr.aria-label]="tr.lang() === 'es' ? 'Switch to English' : 'Cambiar a Español'"
        [title]="tr.lang() === 'es' ? 'Switch to English' : 'Cambiar a Español'"
      >
        {{ tr.lang() === 'es' ? 'EN' : 'ES' }}
      </button>

      <button
        type="button"
        class="header__icon-btn"
        (click)="theme.toggle()"
        [attr.aria-label]="theme.mode() === 'dark' ? 'Activar tema claro' : 'Activar tema oscuro'"
        [title]="theme.mode() === 'dark' ? 'Tema claro' : 'Tema oscuro'"
      >
        <mat-icon>{{ theme.mode() === 'dark' ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>
    </div>
  </div>
</header>
